name: Changelog

# Phase 3 of release autonomy (docs/RELEASE-AUTONOMY-v0.9.50.md).
# Generates the CHANGELOG.md from conventional commits using
# git-cliff. Triggered:
# - on push of a tag v* (produces the release-section and updates
#   CHANGELOG.md, then opens a PR back to main)
# - on workflow_dispatch (manual, prints to job summary)
#
# release.yml will consume the generated changelog body as the
# GitHub Release body once phase 4 (full release pipeline) is wired.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to generate changelog for (e.g. v0.8.30)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so git-cliff sees every commit

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: changelog-tools

      - name: Install git-cliff
        # The third-party orhun/git-cliff-action@v3 uses a Debian buster
        # base image which is EOL — its apt repos return 404. Install
        # the binary ourselves from cargo to avoid the dependency.
        run: cargo install git-cliff --locked

      - name: Resolve tag
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog for this tag
        run: |
          git-cliff --tag "${{ steps.resolve.outputs.tag }}" --latest \
            --output RELEASE_NOTES.md
          echo "── Release notes ──"
          cat RELEASE_NOTES.md
          {
            echo "## Release notes for ${{ steps.resolve.outputs.tag }}"
            echo
            cat RELEASE_NOTES.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Update CHANGELOG.md
        if: github.event_name == 'push'
        run: |
          git-cliff --tag "${{ steps.resolve.outputs.tag }}" \
            --output CHANGELOG.md

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes-${{ steps.resolve.outputs.tag }}
          path: RELEASE_NOTES.md
          retention-days: 30

      - name: Open PR with refreshed CHANGELOG.md
        if: github.event_name == 'push'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Required because tag-push checks out a detached HEAD on the
          # tagged commit, not on a branch. Without `base`, the action
          # fails with: "When the repository is checked out on a commit
          # instead of a branch, the 'base' input must be supplied."
          base: main
          commit-message: "docs(changelog): refresh for ${{ steps.resolve.outputs.tag }}"
          branch: "changelog/${{ steps.resolve.outputs.tag }}"
          title: "docs(changelog): refresh for ${{ steps.resolve.outputs.tag }}"
          body: |
            Auto-generated CHANGELOG.md refresh for tag ${{ steps.resolve.outputs.tag }}.

            Generated by git-cliff from conventional commits.
            See `cliff.toml` for the format configuration.
          labels: |
            changelog
            automated
          add-paths: |
            CHANGELOG.md
