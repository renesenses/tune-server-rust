name: Changelog

# Phase 3 of release autonomy (docs/RELEASE-AUTONOMY-v0.9.50.md).
# Generates the CHANGELOG.md from conventional commits using
# git-cliff. Triggered:
# - on push of a tag v* (produces the release-section and updates
#   CHANGELOG.md, then opens a PR back to main)
# - on workflow_dispatch (manual, prints to job summary)
#
# release.yml will consume the generated changelog body as the
# GitHub Release body once phase 4 (full release pipeline) is wired.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to generate changelog for (e.g. v0.8.30)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so git-cliff sees every commit

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: changelog-tools

      - name: Install git-cliff
        # The third-party orhun/git-cliff-action@v3 uses a Debian buster
        # base image which is EOL — its apt repos return 404. Install
        # the binary ourselves from cargo to avoid the dependency.
        run: cargo install git-cliff --locked

      - name: Resolve tag
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog for this tag
        run: |
          git-cliff --tag "${{ steps.resolve.outputs.tag }}" --latest \
            --output RELEASE_NOTES.md
          echo "── Release notes ──"
          cat RELEASE_NOTES.md
          {
            echo "## Release notes for ${{ steps.resolve.outputs.tag }}"
            echo
            cat RELEASE_NOTES.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Update CHANGELOG.md
        if: github.event_name == 'push'
        run: |
          git-cliff --tag "${{ steps.resolve.outputs.tag }}" \
            --output CHANGELOG.md

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes-${{ steps.resolve.outputs.tag }}
          path: RELEASE_NOTES.md
          retention-days: 30

      - name: Commit refreshed CHANGELOG.md to main
        if: github.event_name == 'push'
        # Direct commit to main instead of opening a PR. The repo
        # has "Allow GitHub Actions to create and approve pull
        # requests" disabled at the org/repo level, so the prior
        # peter-evans/create-pull-request@v6 step failed with
        # "GitHub Actions is not permitted to create or approve
        # pull requests". For an auto-generated file like
        # CHANGELOG.md, a direct commit is simpler anyway — there
        # is nothing to review.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          # Stay on main, not on the detached tag, so the push has a target branch.
          git fetch origin main
          git checkout main
          # Re-generate CHANGELOG.md on the main HEAD so the diff is clean.
          git-cliff --tag "$TAG" --output CHANGELOG.md
          if git diff --quiet CHANGELOG.md; then
            echo "No CHANGELOG.md changes — nothing to commit."
            exit 0
          fi
          git config user.email "renesenses-bot@users.noreply.github.com"
          git config user.name  "renesenses-bot"
          git add CHANGELOG.md
          git commit -m "docs(changelog): refresh for $TAG

          [skip ci]

          Auto-generated by git-cliff from conventional commits."
          git push origin main
