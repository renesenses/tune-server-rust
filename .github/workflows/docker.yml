name: Docker

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: renesenses/tune

jobs:
  build-and-push:
    name: Build & Push (multi-arch)
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Compile the binaries on the host, not inside an emulated arm64 image:
      # amd64 native + arm64 via `cross` (same proven path as release.yml). QEMU
      # is only needed for the light apt/pip runtime steps in Dockerfile.dist.
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: aarch64-unknown-linux-gnu
          rustflags: ""
      - uses: Swatinem/rust-cache@v2
        with:
          key: docker-multiarch
      - name: Install cross
        uses: taiki-e/install-action@cross

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=dev" >> $GITHUB_OUTPUT
          fi

      - name: Set TUNE_VERSION from git tag
        run: echo "TUNE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build web client
        run: |
          # Mirror the server branch topology: RC tags build the web client's
          # release/v0.9 (0.9.x), everything else its main (v0.8.x).
          WEB_BRANCH="${{ contains(github.ref_name, '-rc') && 'release/v0.9' || 'main' }}"
          git clone --depth 1 -b "$WEB_BRANCH" https://github.com/renesenses/tune-web-client.git _web
          cd _web && npm ci && npm run build && cd ..
          rm -rf web && mv _web/dist web
          rm -rf _web

      # tune-server: same feature set as the previous container image (SQLite,
      # no local-audio — a container has no sound card).
      #
      # The amd64 build uses a SEPARATE target dir. Otherwise it writes the
      # host build-script binaries (linked against ubuntu-22.04 glibc 2.35) into
      # the shared target/, and the arm64 `cross` build — which runs inside an
      # older-glibc container — then tries to run those and dies with
      # "GLIBC_2.xx not found". release.yml avoids this by building each arch in
      # a separate job; we build both in one job, so isolate the target dirs.
      - name: Build tune-server (amd64, native)
        env:
          CARGO_TARGET_DIR: target-amd64
        run: |
          sudo apt-get update && sudo apt-get install -y libasound2-dev
          cargo build --release --package tune-server --no-default-features --features oaat
          mkdir -p dist/amd64 && cp target-amd64/release/tune-server dist/amd64/tune-server

      - name: Build tune-server (arm64, cross)
        run: |
          cross build --release --package tune-server \
            --target aarch64-unknown-linux-gnu --no-default-features --features oaat
          mkdir -p dist/arm64 && cp target/aarch64-unknown-linux-gnu/release/tune-server dist/arm64/tune-server

      # librespot (Spotify Connect): real binary on amd64, empty placeholder on
      # arm64 (best-effort — the previous image also fell back to an empty file).
      - name: Build librespot (amd64)
        run: |
          if cargo install librespot --no-default-features --features alsa-backend --root /tmp/lr; then
            cp /tmp/lr/bin/librespot dist/amd64/librespot
          else
            touch dist/amd64/librespot
          fi
          touch dist/arm64/librespot

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.dist
          platforms: linux/amd64,linux/arm64
          # Only push on a real tag. A manual workflow_dispatch (e.g. to validate
          # the multi-arch build) still builds BOTH platforms but doesn't push,
          # so it can't clobber the `latest` tag with a "dev" image.
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ !contains(github.ref_name, '-') && format('{0}:latest', env.IMAGE_NAME) || '' }}
          labels: |
            org.opencontainers.image.title=Tune Server
            org.opencontainers.image.description=Music server for audiophiles — DLNA, Chromecast, streaming services
            org.opencontainers.image.vendor=Mozaik Labs
            org.opencontainers.image.source=https://github.com/renesenses/tune-server-rust
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=docker-v2
          cache-to: type=gha,scope=docker-v2,mode=max
