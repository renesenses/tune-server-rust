name: Docker

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: renesenses/tune

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=dev" >> $GITHUB_OUTPUT
          fi

      - name: Build web client
        run: |
          git clone --depth 1 https://github.com/renesenses/tune-web-client.git _web
          cd _web && npm ci && npm run build && cd ..
          rm -rf web && mv _web/dist web
          rm -rf _web

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          # RC tags (v*-rc*) publish their versioned image but NOT :latest, so
          # `docker pull renesenses/tune:latest` stays on the stable channel.
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ !contains(github.ref_name, '-') && format('{0}:latest', env.IMAGE_NAME) || '' }}
          labels: |
            org.opencontainers.image.title=Tune Server
            org.opencontainers.image.description=Music server for audiophiles — DLNA, Chromecast, streaming services
            org.opencontainers.image.vendor=Mozaik Labs
            org.opencontainers.image.source=https://github.com/renesenses/tune-server-rust
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=docker-v2
          cache-to: type=gha,scope=docker-v2,mode=max
