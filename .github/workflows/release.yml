name: Release

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  web-client:
    name: Build Web Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: renesenses/tune-web-client
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-client
          path: dist/
          retention-days: 1

  build:
    name: Build ${{ matrix.target }}
    needs: web-client
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            platform: linux-x86_64
            ext: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            platform: linux-aarch64
            ext: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-15-intel
            platform: macos-x86_64
            ext: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            platform: macos-aarch64
            ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            platform: windows-x86_64
            ext: zip

    runs-on: ${{ matrix.os }}
    env:
      ARTIFACT: tune-server-${{ github.ref_name }}-${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          rustflags: ""
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.os }}-${{ matrix.target }}

      - uses: actions/download-artifact@v4
        with:
          name: web-client
          path: web

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@cross

      - name: Set TUNE_VERSION from git tag
        shell: bash
        run: echo "TUNE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --package tune-server --target ${{ matrix.target }} --no-default-features --features oaat,postgres

      - name: Install ALSA dev (Linux)
        if: "!matrix.cross && runner.os == 'Linux'"
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Build (native, Linux with local-audio + postgres)
        if: "!matrix.cross && runner.os == 'Linux'"
        run: cargo build --release --package tune-server --target ${{ matrix.target }} --no-default-features --features oaat,local-audio,postgres

      - name: Download ASIO SDK (Windows)
        if: "!matrix.cross && runner.os == 'Windows'"
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://www.steinberg.net/asiosdk" -OutFile asiosdk.zip
          Expand-Archive -Path asiosdk.zip -DestinationPath asiosdk -Force
          $sdkDir = Get-ChildItem -Path asiosdk -Directory | Select-Object -First 1
          echo "CPAL_ASIO_DIR=$($sdkDir.FullName)" >> $env:GITHUB_ENV

      - name: Build (native, Windows with local-audio + ASIO + postgres)
        if: "!matrix.cross && runner.os == 'Windows'"
        run: cargo build --release --package tune-server --target ${{ matrix.target }} --no-default-features --features oaat,local-audio,asio,postgres

      - name: Build (native, macOS with local-audio + postgres)
        if: "!matrix.cross && runner.os == 'macOS'"
        run: cargo build --release --package tune-server --target ${{ matrix.target }} --features postgres

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p package/web
          cp target/${{ matrix.target }}/release/tune-server package/
          cp -r web/* package/web/
          cd package && tar czf ../${{ env.ARTIFACT }}.${{ matrix.ext }} tune-server web/
          cd ..

      - name: Package (windows zip)
        if: runner.os == 'Windows'
        run: |
          mkdir package\web
          copy target\${{ matrix.target }}\release\tune-server.exe package\
          xcopy web\* package\web\ /E /I /Q
          cd package
          7z a ..\${{ env.ARTIFACT }}.${{ matrix.ext }} tune-server.exe web\
          cd ..

      - name: Install NSIS
        if: runner.os == 'Windows'
        run: choco install nsis -y

      - name: Create installer (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          @"
          !include "MUI2.nsh"
          Name "Tune Server"
          OutFile "${{ env.ARTIFACT }}-setup.exe"
          InstallDir "`$PROGRAMFILES\Tune Server"
          RequestExecutionLevel admin

          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_LANGUAGE "French"

          Section "Install"
            ; Kill any running tune-server.exe so Windows releases the file lock
            nsExec::ExecToLog 'taskkill /F /IM tune-server.exe'
            Sleep 1500

            ; Remove stale web client files from previous version
            RMDir /r "`$INSTDIR\web"

            SetOverwrite on
            SetOutPath "`$INSTDIR"
            File "target\${{ matrix.target }}\release\tune-server.exe"
            SetOutPath "`$INSTDIR\web"
            File /r "web\*.*"

            ; Launcher script
            SetOutPath "`$INSTDIR"
            FileOpen `$0 "`$INSTDIR\start-tune-server.bat" w
            FileWrite `$0 '@echo off$\r$\n'
            FileWrite `$0 'cd /d "%~dp0"$\r$\n'
            FileWrite `$0 'set "TUNE_WEB_DIR=%~dp0web"$\r$\n'
            FileWrite `$0 'set "TUNE_PORT=8888"$\r$\n'
            FileWrite `$0 'set "TUNE_OPEN_BROWSER=1"$\r$\n'
            FileWrite `$0 'set "TUNE_LOG_LEVEL=DEBUG"$\r$\n'
            FileWrite `$0 'tune-server.exe$\r$\n'
            FileClose `$0

            ; Start menu
            CreateDirectory "`$SMPROGRAMS\Tune Server"
            CreateShortcut "`$SMPROGRAMS\Tune Server\Tune Server.lnk" "`$INSTDIR\start-tune-server.bat" "" "`$INSTDIR\tune-server.exe"
            CreateShortcut "`$SMPROGRAMS\Tune Server\Uninstall.lnk" "`$INSTDIR\uninstall.exe"
            CreateShortcut "`$DESKTOP\Tune Server.lnk" "`$INSTDIR\start-tune-server.bat" "" "`$INSTDIR\tune-server.exe"

            WriteUninstaller "`$INSTDIR\uninstall.exe"

            ; Registry for Add/Remove Programs
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\TuneServer" "DisplayName" "Tune Server"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\TuneServer" "DisplayVersion" "${version}"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\TuneServer" "UninstallString" "`$INSTDIR\uninstall.exe"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\TuneServer" "Publisher" "Mozaik Labs"
          SectionEnd

          Section "Uninstall"
            ; Kill running process before removing files
            nsExec::ExecToLog 'taskkill /F /IM tune-server.exe'
            Sleep 1000
            RMDir /r "`$INSTDIR"
            Delete "`$DESKTOP\Tune Server.lnk"
            RMDir /r "`$SMPROGRAMS\Tune Server"
            DeleteRegKey HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\TuneServer"
          SectionEnd
          "@ | Out-File -Encoding ASCII installer.nsi
          & "${env:ProgramFiles(x86)}\NSIS\makensis.exe" installer.nsi

      - name: Import signing certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_P12" ]; then echo "No certificate, skipping"; exit 0; fi
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > /tmp/certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import /tmp/certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm /tmp/certificate.p12

      - name: Create DMG (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG_NAME="${{ env.ARTIFACT }}.dmg"
          VERSION="${{ env.VERSION }}"
          APP="Tune Server.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources/web"
          cp target/${{ matrix.target }}/release/tune-server "$APP/Contents/Resources/"
          cp -r web/* "$APP/Contents/Resources/web/"
          # AppleScript launcher — responds to Apple Events, launches server in background, opens browser
          cat > /tmp/tune-launcher.applescript << 'ASCRIPT'
          on run
            set appPath to (path to me as text)
            set posixApp to POSIX path of appPath
            set resDir to posixApp & "Contents/Resources/"
            set serverBin to quoted form of (resDir & "tune-server")
            set webDir to quoted form of (resDir & "web")
            set logFile to (POSIX path of (path to home folder)) & "Library/Logs/tune-server.log"
            do shell script "export TUNE_WEB_DIR=" & webDir & "; export TUNE_PORT=8888; " & serverBin & " >> " & quoted form of logFile & " 2>&1 &"
            delay 1
            open location "http://localhost:8888"
          end run
          ASCRIPT
          osacompile -o "$APP/Contents/MacOS/Tune Server.app" /tmp/tune-launcher.applescript
          # Move the compiled applet contents into our app structure
          mv "$APP/Contents/MacOS/Tune Server.app/Contents/MacOS/applet" "$APP/Contents/MacOS/Tune Server"
          mv "$APP/Contents/MacOS/Tune Server.app/Contents/Resources/Scripts" "$APP/Contents/Resources/Scripts"
          rm -rf "$APP/Contents/MacOS/Tune Server.app"
          cat > "$APP/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>Tune Server</string>
            <key>CFBundleDisplayName</key><string>Tune Server</string>
            <key>CFBundleIdentifier</key><string>fr.mozaiklabs.tune-server</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundleExecutable</key><string>Tune Server</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>13.0</string>
            <key>LSUIElement</key><true/>
            <key>NSAppleScriptEnabled</key><true/>
          </dict>
          </plist>
          PLIST
          if [ -n "$APPLE_TEAM_ID" ]; then
            IDENTITY="Developer ID Application: Bertrand Clech ($APPLE_TEAM_ID)"
            codesign --force --options runtime --sign "$IDENTITY" "$APP/Contents/Resources/tune-server"
            codesign --force --options runtime --sign "$IDENTITY" "$APP"
          fi
          DMG_DIR="dmg-staging"
          mkdir -p "$DMG_DIR"
          cp -R "$APP" "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"
          sync
          for i in 1 2 3; do
            sleep 10
            hdiutil create -volname "Tune Server" -srcfolder "$DMG_DIR" -ov -format UDZO "$DMG_NAME" && break
            echo "hdiutil attempt $i failed, retrying..."
          done
          if [ -n "$APPLE_TEAM_ID" ]; then
            codesign --force --sign "$IDENTITY" "$DMG_NAME"
          fi

      - name: Notarize DMG (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_ID" ]; then echo "No Apple ID, skipping notarization"; exit 0; fi
          DMG_NAME="${{ env.ARTIFACT }}.dmg"
          xcrun notarytool submit "$DMG_NAME" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 600
          xcrun stapler staple "$DMG_NAME"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: |
            ${{ env.ARTIFACT }}.${{ matrix.ext }}
            ${{ env.ARTIFACT }}.dmg
            ${{ env.ARTIFACT }}-setup.exe
          retention-days: 1

  release:
    name: Create Release
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Checksums
        run: |
          cd artifacts
          find . -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.dmg' -o -name '*.exe' \) -exec sha256sum {} \; > ../SHA256SUMS
          cd ..

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.dmg
            artifacts/**/*.exe
            SHA256SUMS
          generate_release_notes: true

  # ─── Release autonomy phase 4 — Homebrew + forum auto-publish ──────
  # Docker Hub publication is handled separately by docker.yml on the
  # same tag, so no docker job here.

  homebrew:
    name: Update Homebrew tap
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: renesenses/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula with new version and SHAs
        id: vals
        working-directory: homebrew-tap
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          F=Formula/tune-server.rb
          if [ ! -f "$F" ]; then
            echo "::error::$F not found in tap repo"
            exit 1
          fi

          # Extract old version from formula (POSIX-compatible, no grep -P)
          OLD_VERSION=$(sed -n 's/^[[:space:]]*version "\([^"]*\)".*/\1/p' "$F")
          if [ -z "$OLD_VERSION" ]; then
            echo "::error::Could not extract version from $F"
            exit 1
          fi
          echo "Updating $OLD_VERSION → $VERSION"

          # Update version string and caveats
          sed -i "s|version \"${OLD_VERSION}\"|version \"${VERSION}\"|g" "$F"
          sed -i "s|Tune Server v${OLD_VERSION}|Tune Server v${VERSION}|g" "$F"

          # Update all download URLs — use regex to catch ANY old version, not just OLD_VERSION
          # This handles cases where the formula has stale versions from failed previous updates
          sed -i -E "s|/v[0-9]+\.[0-9]+\.[0-9]+/|/v${VERSION}/|g" "$F"
          sed -i -E "s|tune-server-v[0-9]+\.[0-9]+\.[0-9]+-|tune-server-v${VERSION}-|g" "$F"

          # Safety: verify all URLs now point to the correct version
          BAD_URLS=$(grep -n "tune-server-v" "$F" | grep -v "tune-server-v${VERSION}" || true)
          if [ -n "$BAD_URLS" ]; then
            echo "::error::Formula still has wrong version in URLs after sed:"
            echo "$BAD_URLS"
            exit 1
          fi

          # Recompute SHA256 for each platform tarball
          BASE="https://github.com/${{ github.repository }}/releases/download/v${VERSION}"
          for PLATFORM in macos-aarch64 macos-x86_64 linux-aarch64 linux-x86_64; do
            FILE="tune-server-v${VERSION}-${PLATFORM}.tar.gz"
            URL="${BASE}/${FILE}"
            echo "Fetching ${PLATFORM}..."
            for i in 1 2 3 4 5; do
              if curl -fL --retry 0 -o "/tmp/${FILE}" "$URL"; then break; fi
              echo "  attempt $i failed, retrying in 10s..."
              sleep 10
            done
            NEW_SHA=$(sha256sum "/tmp/${FILE}" | cut -d' ' -f1)
            # Find the sha256 line that follows this platform's url line
            OLD_SHA=$(grep -A1 "${PLATFORM}" "$F" | sed -n 's/^[[:space:]]*sha256 "\([0-9a-f]*\)".*/\1/p')
            if [ -n "$OLD_SHA" ]; then
              sed -i "s|${OLD_SHA}|${NEW_SHA}|" "$F"
              echo "  ${PLATFORM}: ${OLD_SHA} → ${NEW_SHA}"
            else
              echo "::warning::Could not find SHA for ${PLATFORM}"
            fi
          done

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "── Updated formula ──"
          cat "$F"

      - name: Commit and push to tap
        working-directory: homebrew-tap
        run: |
          git config user.email "renesenses-bot@users.noreply.github.com"
          git config user.name  "renesenses-bot"
          git add Formula/tune-server.rb
          git diff --cached --quiet && echo "Formula already up to date" && exit 0
          git commit -m "tune-server v${{ steps.vals.outputs.version }}"
          git push origin HEAD

  notify-website:
    name: Update mozaiklabs.fr/download
    needs: [release, homebrew]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Notify mozaiklabs.fr webhook
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          PAYLOAD=$(gh api repos/${{ github.repository }}/releases/tags/${TAG})
          BODY=$(jq -n \
            --arg action "published" \
            --argjson release "$PAYLOAD" \
            --arg repo_name "tune-server-rust" \
            --arg repo_full "${{ github.repository }}" \
            '{action: $action, release: $release, repository: {name: $repo_name, full_name: $repo_full}}')
          SIGNATURE="sha256=$(echo -n "$BODY" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | cut -d' ' -f2)"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: release" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            -d "$BODY" \
            https://mozaiklabs.fr/webhooks/github/release)
          echo "Webhook response: HTTP $STATUS"
          if [ "$STATUS" -ge 400 ]; then
            echo "::warning::Webhook returned HTTP $STATUS — /download may not be updated"
          fi

  forum:
    name: Announce on mozaiklabs forum
    needs: release
    if: false  # Disabled — forum posts are written manually with better formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        run: cargo install git-cliff --locked

      - name: Build release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME}"
          # Write git-cliff output to an intermediate file so the
          # following assembly doesn't race with itself (cat reading
          # a file that is also the redirection target crashes with
          # "input file is output file").
          git-cliff --tag "$VERSION" --latest --output CHANGELOG_SECTION.md
          {
            echo "Version $VERSION disponible — résumé :"
            echo
            cat CHANGELOG_SECTION.md
            echo
            echo "Téléchargements : https://github.com/${GITHUB_REPOSITORY}/releases/tag/$VERSION"
            echo "Image Docker : \`renesenses/tune:$VERSION\` (multi-arch amd64/arm64)"
            echo "Homebrew : \`brew tap renesenses/tap && brew install tune-server\`"
          } > FORUM_BODY.md
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Post forum thread
        env:
          FORUM_TOKEN: ${{ secrets.FORUM_TOKEN }}
          VERSION: ${{ steps.notes.outputs.version }}
        run: |
          # Trim the body to a reasonable size (forum max ~10k).
          BODY=$(head -c 8000 FORUM_BODY.md | python3 -c "import sys, json; print(json.dumps(sys.stdin.read()))")
          TITLE="[Release] tune-server $VERSION disponible"
          PAYLOAD=$(cat <<EOF
          {
            "title": "$TITLE",
            "body": $BODY,
            "category": "releases",
            "pinned": true
          }
          EOF
          )
          STATUS=$(curl -s -o response.json -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer $FORUM_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://mozaiklabs.fr/api/v1/forum/threads")
          echo "HTTP $STATUS"
          cat response.json
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "201" ]; then
            echo "::error::forum POST failed with HTTP $STATUS"
            exit 1
          fi
