name: Release

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  web-client:
    name: Build Web Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: renesenses/tune-web-client
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-client
          path: dist/
          retention-days: 1

  build:
    name: Build ${{ matrix.target }}
    needs: web-client
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux-x86_64
            ext: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux-aarch64
            ext: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-15-intel
            platform: macos-x86_64
            ext: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            platform: macos-aarch64
            ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            platform: windows-x86_64
            ext: zip

    runs-on: ${{ matrix.os }}
    env:
      ARTIFACT: tune-server-${{ github.ref_name }}-${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          targets: ${{ matrix.target }}
          rustflags: ""
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - uses: actions/download-artifact@v4
        with:
          name: web-client
          path: web

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@cross

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --package tune-server --target ${{ matrix.target }} --no-default-features

      - name: Build (native, no local-audio on Linux/Windows)
        if: "!matrix.cross && runner.os != 'macOS'"
        run: cargo build --release --package tune-server --target ${{ matrix.target }} --no-default-features

      - name: Build (native, macOS with local-audio)
        if: "!matrix.cross && runner.os == 'macOS'"
        run: cargo build --release --package tune-server --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p package/web
          cp target/${{ matrix.target }}/release/tune-server package/
          cp -r web/* package/web/
          cd package && tar czf ../${{ env.ARTIFACT }}.${{ matrix.ext }} tune-server web/
          cd ..

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          mkdir package\web
          copy target\${{ matrix.target }}\release\tune-server.exe package\
          xcopy web\* package\web\ /E /I /Q
          cd package
          7z a ..\${{ env.ARTIFACT }}.${{ matrix.ext }} tune-server.exe web\
          cd ..

      - name: Create DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          DMG_NAME="${{ env.ARTIFACT }}.dmg"
          APP_DIR="Tune Server"
          mkdir -p "$APP_DIR/web"
          cp target/${{ matrix.target }}/release/tune-server "$APP_DIR/"
          cp -r web/* "$APP_DIR/web/"
          cat > "$APP_DIR/start-tune-server.command" << 'SCRIPT'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          export TUNE_WEB_DIR="$DIR/web"
          export TUNE_PORT="${TUNE_PORT:-8888}"
          open "http://localhost:$TUNE_PORT" &
          exec "$DIR/tune-server"
          SCRIPT
          chmod +x "$APP_DIR/start-tune-server.command"
          hdiutil create -volname "Tune Server" -srcfolder "$APP_DIR" -ov -format UDZO "$DMG_NAME"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: |
            ${{ env.ARTIFACT }}.${{ matrix.ext }}
            ${{ env.ARTIFACT }}.dmg
          retention-days: 1

  release:
    name: Create Release
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Checksums
        run: |
          cd artifacts
          find . -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.dmg' \) -exec sha256sum {} \; > ../SHA256SUMS
          cd ..

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.dmg
            SHA256SUMS
          generate_release_notes: true
