name: Release

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  web-client:
    name: Build Web Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: renesenses/tune-web-client
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-client
          path: dist/
          retention-days: 1

  build:
    name: Build ${{ matrix.target }}
    needs: web-client
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux-x86_64
            ext: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux-aarch64
            ext: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-15-intel
            platform: macos-x86_64
            ext: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            platform: macos-aarch64
            ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            platform: windows-x86_64
            ext: zip

    runs-on: ${{ matrix.os }}
    env:
      ARTIFACT: tune-server-${{ github.ref_name }}-${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          targets: ${{ matrix.target }}
          rustflags: ""
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - uses: actions/download-artifact@v4
        with:
          name: web-client
          path: web

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@cross

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --package tune-server --target ${{ matrix.target }} --no-default-features

      - name: Build (native, no local-audio on Linux/Windows)
        if: "!matrix.cross && runner.os != 'macOS'"
        run: cargo build --release --package tune-server --target ${{ matrix.target }} --no-default-features

      - name: Build (native, macOS with local-audio)
        if: "!matrix.cross && runner.os == 'macOS'"
        run: cargo build --release --package tune-server --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p package/web
          cp target/${{ matrix.target }}/release/tune-server package/
          cp -r web/* package/web/
          cd package && tar czf ../${{ env.ARTIFACT }}.${{ matrix.ext }} tune-server web/
          cd ..

      - name: Package (windows zip)
        if: runner.os == 'Windows'
        run: |
          mkdir package\web
          copy target\${{ matrix.target }}\release\tune-server.exe package\
          xcopy web\* package\web\ /E /I /Q
          cd package
          7z a ..\${{ env.ARTIFACT }}.${{ matrix.ext }} tune-server.exe web\
          cd ..

      - name: Install NSIS
        if: runner.os == 'Windows'
        run: choco install nsis -y

      - name: Create installer (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          @"
          !include "MUI2.nsh"
          Name "Tune Server"
          OutFile "${{ env.ARTIFACT }}-setup.exe"
          InstallDir "`$PROGRAMFILES\Tune Server"
          RequestExecutionLevel admin

          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_LANGUAGE "French"

          Section "Install"
            SetOutPath "`$INSTDIR"
            File "target\${{ matrix.target }}\release\tune-server.exe"
            SetOutPath "`$INSTDIR\web"
            File /r "web\*.*"

            ; Launcher script
            SetOutPath "`$INSTDIR"
            FileOpen `$0 "`$INSTDIR\start-tune-server.bat" w
            FileWrite `$0 '@echo off$\r$\n'
            FileWrite `$0 'cd /d "%~dp0"$\r$\n'
            FileWrite `$0 'set "TUNE_WEB_DIR=%~dp0web"$\r$\n'
            FileWrite `$0 'set "TUNE_PORT=8888"$\r$\n'
            FileWrite `$0 'start http://localhost:%TUNE_PORT%$\r$\n'
            FileWrite `$0 'tune-server.exe$\r$\n'
            FileClose `$0

            ; Start menu
            CreateDirectory "`$SMPROGRAMS\Tune Server"
            CreateShortcut "`$SMPROGRAMS\Tune Server\Tune Server.lnk" "`$INSTDIR\start-tune-server.bat" "" "`$INSTDIR\tune-server.exe"
            CreateShortcut "`$SMPROGRAMS\Tune Server\Uninstall.lnk" "`$INSTDIR\uninstall.exe"
            CreateShortcut "`$DESKTOP\Tune Server.lnk" "`$INSTDIR\start-tune-server.bat" "" "`$INSTDIR\tune-server.exe"

            WriteUninstaller "`$INSTDIR\uninstall.exe"

            ; Registry for Add/Remove Programs
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\TuneServer" "DisplayName" "Tune Server"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\TuneServer" "DisplayVersion" "${version}"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\TuneServer" "UninstallString" "`$INSTDIR\uninstall.exe"
            WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\TuneServer" "Publisher" "Mozaik Labs"
          SectionEnd

          Section "Uninstall"
            RMDir /r "`$INSTDIR"
            Delete "`$DESKTOP\Tune Server.lnk"
            RMDir /r "`$SMPROGRAMS\Tune Server"
            DeleteRegKey HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\TuneServer"
          SectionEnd
          "@ | Out-File -Encoding ASCII installer.nsi
          & "${env:ProgramFiles(x86)}\NSIS\makensis.exe" installer.nsi

      - name: Import signing certificate
        if: ${{ runner.os == 'macOS' && secrets.APPLE_CERTIFICATE_P12 != '' }}
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > /tmp/certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import /tmp/certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm /tmp/certificate.p12

      - name: Create DMG (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG_NAME="${{ env.ARTIFACT }}.dmg"
          APP_DIR="Tune Server"
          mkdir -p "$APP_DIR/web"
          cp target/${{ matrix.target }}/release/tune-server "$APP_DIR/"
          cp -r web/* "$APP_DIR/web/"
          cat > "$APP_DIR/start-tune-server.command" << 'SCRIPT'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          export TUNE_WEB_DIR="$DIR/web"
          export TUNE_PORT="${TUNE_PORT:-8888}"
          open "http://localhost:$TUNE_PORT" &
          exec "$DIR/tune-server"
          SCRIPT
          chmod +x "$APP_DIR/start-tune-server.command"
          if [ -n "$APPLE_TEAM_ID" ]; then
            IDENTITY="Developer ID Application: Bertrand Clech ($APPLE_TEAM_ID)"
            codesign --force --options runtime --sign "$IDENTITY" "$APP_DIR/tune-server"
            codesign --force --sign "$IDENTITY" "$APP_DIR/start-tune-server.command"
          fi
          hdiutil create -volname "Tune Server" -srcfolder "$APP_DIR" -ov -format UDZO "$DMG_NAME"
          if [ -n "$APPLE_TEAM_ID" ]; then
            codesign --force --sign "$IDENTITY" "$DMG_NAME"
          fi

      - name: Notarize DMG (macOS)
        if: ${{ runner.os == 'macOS' && secrets.APPLE_ID != '' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG_NAME="${{ env.ARTIFACT }}.dmg"
          xcrun notarytool submit "$DMG_NAME" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 600
          xcrun stapler staple "$DMG_NAME"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: |
            ${{ env.ARTIFACT }}.${{ matrix.ext }}
            ${{ env.ARTIFACT }}.dmg
            ${{ env.ARTIFACT }}-setup.exe
          retention-days: 1

  release:
    name: Create Release
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Checksums
        run: |
          cd artifacts
          find . -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.dmg' -o -name '*.exe' \) -exec sha256sum {} \; > ../SHA256SUMS
          cd ..

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.dmg
            artifacts/**/*.exe
            SHA256SUMS
          generate_release_notes: true
