name: Release

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  web-client:
    name: Build Web Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: renesenses/tune-web-client
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-client
          path: dist/
          retention-days: 1

  build:
    name: Build ${{ matrix.target }}
    needs: web-client
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: tune-server-linux-x86_64
            ext: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: tune-server-linux-aarch64
            ext: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-13
            artifact: tune-server-macos-x86_64
            ext: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: tune-server-macos-aarch64
            ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: tune-server-windows-x86_64
            ext: zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - uses: actions/download-artifact@v4
        with:
          name: web-client
          path: web

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@cross

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --package tune-server --target ${{ matrix.target }} --no-default-features

      - name: Build (native, no local-audio on Linux/Windows)
        if: "!matrix.cross && runner.os != 'macOS'"
        run: cargo build --release --package tune-server --target ${{ matrix.target }} --no-default-features

      - name: Build (native, macOS with local-audio)
        if: "!matrix.cross && runner.os == 'macOS'"
        run: cargo build --release --package tune-server --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p package/web
          cp target/${{ matrix.target }}/release/tune-server package/
          cp -r web/* package/web/
          cd package && tar czf ../${{ matrix.artifact }}.${{ matrix.ext }} tune-server web/
          cd ..

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          mkdir package\web
          copy target\${{ matrix.target }}\release\tune-server.exe package\
          xcopy web\* package\web\ /E /I /Q
          cd package
          7z a ..\${{ matrix.artifact }}.${{ matrix.ext }} tune-server.exe web\
          cd ..

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.${{ matrix.ext }}
          retention-days: 1

  release:
    name: Create Release
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Checksums
        run: |
          cd artifacts
          find . -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec sha256sum {} \; > ../SHA256SUMS
          cd ..

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            SHA256SUMS
          generate_release_notes: true
