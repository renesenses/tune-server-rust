# git-cliff configuration for Tune.
#
# Phase 3 of release autonomy (docs/RELEASE-AUTONOMY-v0.9.50.md).
# Generates CHANGELOG.md and GitHub Release bodies from conventional
# commits (feat:, fix:, perf:, docs:, refactor:, test:, ci:, chore:).
#
# Run locally:
#     git-cliff --tag v0.8.30                # changelog for unreleased commits at v0.8.30
#     git-cliff --tag v0.8.30 --output CHANGELOG.md
#     git-cliff --tag v0.8.30 --latest       # just the section for this tag
#
# Install: cargo install git-cliff --locked

[changelog]
header = """
# Changelog

All notable changes to Tune are documented here. The format follows
[Keep a Changelog](https://keepachangelog.com/en/1.1.0/) and the
project adheres to [Semantic Versioning](https://semver.org/).

"""
body = """
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first | trim }}{% if commit.id %} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/renesenses/tune-server-rust/commit/{{ commit.id }})){% endif %}{% if commit.breaking %} — **BREAKING**{% endif %}
{%- endfor %}
{% endfor %}
"""
trim = true
footer = """
<!-- generated by git-cliff -->
"""

[git]
conventional_commits = true
filter_unconventional = false  # keep unconventional commits in "Other" group
split_commits = false
commit_preprocessors = [
    # strip co-authored-by trailers from the rendered changelog
    { pattern = '\n+Co-Authored-By:.*', replace = "" },
    # strip "🤖 Generated with Claude" trailers
    { pattern = '\n+🤖 Generated.*', replace = "" },
]
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug fixes" },
    { message = "^perf", group = "Performance" },
    { message = "^docs", group = "Documentation" },
    { message = "^refactor", group = "Refactor" },
    { message = "^test", group = "Tests" },
    { message = "^ci", group = "CI / build" },
    { message = "^chore\\(release\\):", skip = true },           # skip "chore(release): bump vX.Y.Z"
    { message = "^bump v[0-9]", skip = true },                    # skip plain "bump v0.8.27" commits
    { message = "^Merge branch", skip = true },                   # skip noisy merge commits
    { message = "^chore", group = "Chore" },
    { message = "^style", group = "Style" },
    { message = "^build", group = "Build" },
    { message = ".*", group = "Other" },
]
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
