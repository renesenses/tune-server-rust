# cargo-deny configuration — gates the release preflight (`cargo deny check`).
#
# Policy: Tune ships as a distributed binary. We allow permissive licenses plus
# MPL-2.0 (file-level copyleft, does not infect the binary). Strong/weak-copyleft
# like LGPL is NOT allowed — crates that offer it as one option of a multi-license
# (e.g. r-efi = "MIT OR Apache-2.0 OR LGPL-2.1-or-later") are covered by the
# MIT/Apache-2.0 options instead.

[advisories]
version = 2
ignore = [
    # paste 1.0.15 — unmaintained: the author archived the repo (RUSTSEC-2024-0436).
    # Pulled transitively via lofty / notify. It is a compile-time proc-macro helper
    # with no runtime code path and no known vulnerability; there is no safe upgrade
    # today. Revisit once lofty/notify migrate off paste.
    "RUSTSEC-2024-0436",
    # instant 0.1 — unmaintained (RUSTSEC-2024-0384), superseded by web-time.
    # Transitive only. No vulnerability; a native build never hits its wasm path.
    "RUSTSEC-2024-0384",
]

[licenses]
version = 2
confidence-threshold = 0.9
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "ISC",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
    "MPL-2.0",
]

[bans]
# Defaults: warn on duplicate crate versions (already "bans ok").
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"

# First-party git dependencies (oaat-core / oaat-controller live in the
# renesenses/oaat repo, pinned by rev). Everything else must come from crates.io.
[sources.allow-org]
github = ["renesenses"]
