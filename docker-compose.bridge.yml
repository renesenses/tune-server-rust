services:
  bridge:
    build:
      context: .
      dockerfile: Dockerfile.bridge
    container_name: tune-bridge
    environment:
      - BRIDGE_PORT=9090
      - RUST_LOG=tune_bridge=info
    ports:
      - "127.0.0.1:9090:9090"
    restart: unless-stopped
    # TLS: handled by the existing mozaiklabs nginx container
    # Add bridge.mozaiklabs.fr vhost in /opt/mozaiklabs/docker/nginx/
