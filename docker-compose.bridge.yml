services:
  bridge:
    build:
      context: .
      dockerfile: Dockerfile.bridge
    container_name: tune-bridge
    environment:
      - BRIDGE_PORT=9090
      - RUST_LOG=tune_bridge=info
    ports:
      - "127.0.0.1:9090:9090"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: tune-caddy
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./Caddyfile.bridge:/etc/caddy/Caddyfile
      - caddy-data:/data
    depends_on:
      - bridge
    restart: unless-stopped

volumes:
  caddy-data:
