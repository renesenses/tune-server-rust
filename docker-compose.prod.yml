## Tune Server — Production with PostgreSQL
##
## Usage:
##   1. Replace /path/to/music with your music library path
##   2. Change POSTGRES_PASSWORD for production use
##   3. docker compose -f docker-compose.prod.yml up -d
##   4. Open http://localhost:8888
##
## For DLNA/SSDP/mDNS discovery, add network_mode: host to the tune service
## and remove the ports mapping (host mode exposes all ports directly).

services:
  tune:
    image: renesenses/tune:latest
    container_name: tune-server
    ports:
      - "8888:8888"
    volumes:
      - tune-data:/data
      - /path/to/music:/music:ro
    environment:
      - TUNE_MUSIC_DIRS=["/music"]
      - TUNE_DATABASE_URL=postgres://tune:tune@db:5432/tune
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: tune-db
    volumes:
      - pg-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: tune
      POSTGRES_PASSWORD: tune
      POSTGRES_DB: tune
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tune"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  tune-data:
  pg-data:
