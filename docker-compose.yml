## Tune Server — Docker Compose
##
## Quick start:
##   1. Replace /path/to/music with your music library path
##   2. docker compose up -d
##   3. Open http://localhost:8888
##
## For DLNA/SSDP/mDNS discovery, add: network_mode: host
## (not supported on macOS/Windows Docker Desktop)

services:
  tune:
    image: renesenses/tune:latest
    container_name: tune-server
    ports:
      - "8888:8888"
    volumes:
      - tune-data:/data
      - /path/to/music:/music:ro
    environment:
      - TUNE_MUSIC_DIRS=["/music"]
    restart: unless-stopped

volumes:
  tune-data:
