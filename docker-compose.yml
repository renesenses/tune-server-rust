services:
  tune:
    build: .
    image: renesenses/tune:latest
    container_name: tune-server
    restart: unless-stopped
    network_mode: host
    volumes:
      - tune-data:/data
      - /path/to/music:/music:ro
      # - ./web:/app/web:ro
    environment:
      - TUNE_PORT=8085
      - TUNE_DB_PATH=/data/tune.db
      - TUNE_ARTWORK_DIR=/data/artwork_cache
      - TUNE_AUTO_SCAN=true
      - TUNE_MUSIC_DIRS=/music

volumes:
  tune-data:
