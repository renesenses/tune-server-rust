<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tune — Vinyl</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body>
  <div id="app">
    <!-- Connection status -->
    <div id="connection-bar">
      <span id="connection-dot"></span>
      <span id="connection-text">Connecting...</span>
    </div>

    <!-- Main layout -->
    <div id="main">
      <!-- Left: Turntable -->
      <div id="turntable-section">
        <div id="turntable">
          <!-- Platter -->
          <div id="platter">
            <div id="vinyl-disc">
              <div id="vinyl-grooves"></div>
              <div id="vinyl-label">
                <img id="cover-art" src="" alt="" crossorigin="anonymous">
                <div id="cover-placeholder">
                  <svg viewBox="0 0 24 24" fill="currentColor" width="40" height="40"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                </div>
              </div>
              <div id="spindle"></div>
            </div>
          </div>
          <!-- Tonearm -->
          <div id="tonearm-base">
            <div id="tonearm">
              <div id="tonearm-head"></div>
            </div>
          </div>
        </div>

        <!-- Track info -->
        <div id="track-info">
          <h1 id="track-title">No track</h1>
          <p id="track-artist">—</p>
          <p id="track-album"></p>
        </div>

        <!-- Audio badge -->
        <div id="audio-badge">
          <span id="badge-format">—</span>
          <span id="badge-quality"></span>
        </div>

        <!-- Seek bar -->
        <div id="seek-section">
          <span id="time-current">0:00</span>
          <input type="range" id="seek-bar" min="0" max="100" value="0">
          <span id="time-total">0:00</span>
        </div>

        <!-- Controls -->
        <div id="controls">
          <button id="btn-shuffle" class="ctrl-btn" title="Shuffle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
          </button>
          <button id="btn-prev" class="ctrl-btn" title="Previous">
            <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
          </button>
          <button id="btn-play" class="ctrl-btn ctrl-play" title="Play">
            <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor" width="32" height="32"><path d="M8 5v14l11-7z"/></svg>
            <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor" width="32" height="32" style="display:none"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg>
          </button>
          <button id="btn-next" class="ctrl-btn" title="Next">
            <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
          </button>
          <button id="btn-repeat" class="ctrl-btn" title="Repeat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
          </button>
        </div>
      </div>

      <!-- Right: Queue -->
      <div id="queue-section">
        <div id="queue-header">
          <h2>Current Playlist</h2>
          <span id="queue-count">0 / 0</span>
        </div>
        <div id="queue-list"></div>
      </div>
    </div>

    <!-- Bottom bar -->
    <div id="bottom-bar">
      <div id="zone-selector">
        <select id="zone-select"></select>
      </div>
      <div id="volume-section">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        <input type="range" id="volume-slider" min="0" max="100" value="50">
        <span id="volume-value">50</span>
      </div>
      <a href="/" id="link-default" title="Interface standard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      </a>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
