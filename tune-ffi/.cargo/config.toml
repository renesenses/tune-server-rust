# Android NDK cross-compilation config for tune-ffi
# Requires: ANDROID_NDK_HOME or NDK at ~/Library/Android/sdk/ndk/<version>

[target.aarch64-linux-android]
linker = "aarch64-linux-android24-clang"

[target.armv7-linux-androideabi]
linker = "armv7a-linux-androideabi24-clang"

[target.x86_64-linux-android]
linker = "x86_64-linux-android24-clang"
