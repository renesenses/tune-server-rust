<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tune Widget</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <select id="zone-select"></select>
      <button id="btn-close" title="Masquer">×</button>
    </header>

    <div id="cover-container">
      <img id="cover-art" src="" alt="">
      <div id="cover-placeholder">♪</div>
    </div>

    <div id="track-info">
      <div id="track-title">—</div>
      <div id="track-artist">—</div>
    </div>

    <div id="progress-container">
      <input type="range" id="progress-bar" min="0" max="100" value="0" step="0.1">
      <div id="progress-times">
        <span id="time-current">0:00</span>
        <span id="time-total">0:00</span>
      </div>
    </div>

    <div id="controls">
      <button id="btn-prev" title="Précédent">
        <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button id="btn-play" title="Play/Pause">
        <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor" width="32" height="32"><path d="M8 5v14l11-7z"/></svg>
        <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor" width="32" height="32" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button id="btn-next" title="Suivant">
        <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
    </div>

    <div id="volume-container">
      <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
      <input type="range" id="volume-slider" min="0" max="100" value="50" step="1">
      <span id="volume-value">50</span>
    </div>

    <div id="search-container">
      <input type="text" id="search-input" placeholder="Rechercher..." autocomplete="off">
      <div id="search-results"></div>
    </div>

    <div id="status-bar">
      <span id="server-status">●</span>
      <span id="server-label">Connecté</span>
      <span style="flex:1"></span>
      <button id="btn-settings" title="Réglages">⚙</button>
    </div>

    <div id="settings-panel" style="display:none">
      <h3>Réglages</h3>
      <label for="server-url">Serveur Tune</label>
      <div id="server-config">
        <input type="text" id="server-url" placeholder="192.168.1.15:8888" autocomplete="off">
        <button id="btn-connect">OK</button>
      </div>
      <button id="btn-settings-back">← Retour</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
